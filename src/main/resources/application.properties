spring.application.name=Backend_Hotel

spring.datasource.url=jdbc:postgresql://localhost:${POSTGRES_PORT}/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.graphql.graphiql.enabled=true

#para usar websocket
spring.graphql.websocket.path=/graphql

# CORS dedicado para el endpoint GraphQL (HTTP y WebSocket comparten esta configuracion).
# WebMvcConfigurer.addCorsMappings (WebConfig.java) cubre las peticiones HTTP normales,
# pero el handshake del WebSocket de Spring for GraphQL se registra por una ruta interna
# separada que no hereda esa configuracion automaticamente. Esta propiedad es el mecanismo
# oficial de Spring for GraphQL para cubrir ambos transportes con la misma fuente CORS.
spring.graphql.cors.allowed-origins=http://localhost:5173
spring.graphql.cors.allowed-methods=GET,POST,OPTIONS
spring.graphql.cors.allowed-headers=*
spring.graphql.cors.allow-credentials=true

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Multipart
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

